<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>노곰한컷</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            position: relative;
            width: 440px;
            height: 920px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            touch-action: none;
            transform-origin: center center;
        }

        @media (max-width: 440px) or (max-height: 920px) {
            #game-container {
                transform: scale(min(calc(100vw / 440), calc(100vh / 920)));
            }
        }

        :fullscreen #game-container, :-webkit-full-screen #game-container {
            transform: scale(min(calc(100vw / 440), calc(100vh / 920))) !important;
            margin: auto;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
        }

        /* 게임 화면 스크린창 - fixed height to preserve 820px layout scale */
        #screen-window {
            position: relative;
            width: calc(100% - 30px);
            height: 564px;
            background-color: #333;
            overflow: hidden;
            border: 2px solid #555;
            margin-top: 75px;
            box-sizing: border-box;
            z-index: 10;
        }

        /* 레이어 순서 설정 */
        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #btn-right {
            transform: translateX(0);
        }

        #btn-jump {
            transform: translateX(-10px);
        }

        #start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5000;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 2s ease-out;
        }

        #start-overlay img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #layer-fbg { z-index: 0; }
        #layer-bg { z-index: 1; }
        #layer-house-bg { z-index: 2; }
        #layer-drawing { z-index: 3; }
        #layer-character { z-index: 4; }
        #layer-items { z-index: 5; }
        #layer-speech { z-index: 6; pointer-events: none; }
        #layer-ui { z-index: 7; pointer-events: none; }


        .bg-img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #player {
            position: absolute;
            bottom: 50px; /* 바닥 위치 */
            left: 50px;
            object-fit: contain;
            image-rendering: pixelated;
            /* Center the sprite horizontally on its coordinate */
            transform: translateX(-50%);
            z-index: 10;
        }

        .item {
            position: absolute;
        }

        #art-item {
            right: 120px;
            bottom: 45px;
        }

        #house {
            right: 30px;
            bottom: 50px;
        }

        /* 컨트롤러 레이아웃 - fixed height to preserve 820px layout scale */
        #controls {
            position: absolute;
            bottom: 110px;
            width: 100%;
            height: 246px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            pointer-events: auto;
        }

        .control-group {
            display: flex;
            gap: 20px;
        }

        .btn {
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .btn img {
            pointer-events: none;
        }

        /* 말풍선 및 상점/아트 UI */
        #speech-bubble-container {
            position: absolute;
            top: calc(50% - 50px);
            left: 50%;
            transform: translate(-50%, -100%);
            display: none;
            cursor: pointer;
            pointer-events: auto;
        }

        #speech-bubble {
        }

        #yes-btn {
            position: absolute;
            display: none;
            cursor: pointer;
            z-index: 4000;
            pointer-events: auto;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        #guide-a {
            position: absolute;
            top: 49px;
            right: 30px;
            transform: scale(0.8);
            pointer-events: none;
            display: none;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
        .blink {
            animation: blink 1s infinite;
        }

        #star {
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: top 1s ease-out;
        }

        @keyframes starExit {
            0% { transform: translate(-50%, -50%); opacity: 1; }
            30% { transform: translate(-40%, -100%) scale(1.2); }
            100% { transform: translate(-20%, -600%) scale(0.5); opacity: 0; }
        }

        .star-jump-out {
            animation: starExit 1s forwards ease-in;
        }

        /* 아트 창 */
        #art-window {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            display: none;
            background-color: #7D7D7D;
            pointer-events: auto;
        }

        #art-name-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .canvas-container {
            position: absolute;
            background: white;
            border: 2px solid #000;
            pointer-events: auto;
        }

        #canvas-left {
            width: 200px;
            height: 300px;
            left: 0;
            top: 250px;
            pointer-events: auto;
        }

        #canvas-right {
            width: 160px;
            height: 60px;
            left: 205px;
            top: 490px;
            pointer-events: auto;
        }

        #art-ui {
            position: absolute;
            bottom: 245px; /* snippet 220 + 25 extra */
            left: 0;
            width: 100%;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            pointer-events: none;
        }

        #art-ui > * {
            pointer-events: auto;
        }

        #palette-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            transform: translateY(-15px); /* Exactly 15px up from baseline */
        }

        .bold-dots {
            position: relative;
            width: 60px;
            height: 60px;
            cursor: pointer;
        }

        .dot {
            position: absolute;
            background: #FFFFFF;
            border-radius: 50%;
            border: 3px solid #000;
            box-sizing: border-box;
            transition: background 0.2s;
        }

        #exit-btn {
            position: absolute;
            top: 240px;
            right: 44px;
            cursor: pointer;
            z-index: 105;
        }

        #btn-eraser {
            position: absolute;
            right: 44px;
            top: 430px;
            cursor: pointer;
            z-index: 105;
        }

        #color-palette {
            position: relative;
            transform: translateY(-15px); /* Exactly 15px up from baseline */
            display: none;
            grid-template-columns: repeat(8, 30px);
            gap: 5px;
            padding: 5px;
        }

        .color-opt {
            width: 25px;
            height: 25px;
            cursor: pointer;
            border: 1px solid #ccc;
        }

        #confirm-exit {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.6);
            text-align: center;
            z-index: 3000;
            pointer-events: auto;
        }

        .exit-btns {
            margin-top: 70px;
            display: flex;
            justify-content: center;
            gap: 30px;
            pointer-events: auto;
        }

        #ok-btn, #no-btn {
            cursor: pointer;
            transition: transform 0.1s;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
        }
        #ok-btn:active, #no-btn:active {
            transform: scale(0.95);
        }

        #ending-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('end.png');
            background-size: cover;
            background-position: center;
            z-index: 5000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #ending-content {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #ebg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 440px;
            height: 920px;
            object-fit: contain;
            z-index: 0;
            pointer-events: none;
        }

        #save-btn {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 6000;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        #save-flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 5000;
            pointer-events: none;
            display: none;
        }

        #save-notice {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5100;
            pointer-events: none;
            display: none;
        }

        #result-canvases {
            position: relative;
            width: 100%;
            height: 400px;
            z-index: 10;
        }

        .captured-canvas {
            border: 1px solid #000;
            background: white;
            position: absolute;
        }

        .canvas-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .canvas-container canvas {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
        }

        .canvas-container {
            box-sizing: border-box;
        }

        .fade {
            transition: opacity 0.5s ease-in-out;
        }
        .fade-out {
            opacity: 0;
        }

        @keyframes boing {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .boing-effect {
            animation: boing 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="start-overlay">
            <img src="start.png" alt="시작">
        </div>
        <div id="layer-fbg" class="layer">
            <img src="fbg.png" class="bg-img" alt="전체배경">
        </div>
        <!-- 스크린창 -->
        <div id="screen-window">
            <div id="layer-bg" class="layer">
                <img src="bg.png" id="bg-img" class="bg-img" alt="배경">
            </div>
            <!-- House is behind the player -->
            <div id="layer-house-bg" class="layer">
                <img src="house.png" id="house" class="item" alt="집">
            </div>
            <div id="layer-drawing" class="layer">
                <!-- 동적 드로잉 레이어 -->
            </div>
            <div id="layer-items" class="layer">
                <img src="art.png" id="art-item" class="item" alt="아트">
                <img src="cook.png" id="cook-item" class="item" alt="요리" style="display:none; right: 50px; bottom: 50px;">
                <img src="door.png" id="door-item" class="item" alt="문" style="display:none; left: 20px; bottom: 50px;">
            </div>
            <div id="layer-character" class="layer">
                <img id="player" src="p.png">
            </div>
            <div id="layer-speech" class="layer">
                <img src="star.png" id="star" alt="별">
                <div id="speech-bubble-container" class="fade">
                    <img src="w.png" id="speech-bubble" alt="말풍선">
                    <img src="a1.png" id="guide-a" class="blink" alt="가이드">
                </div>
            </div>
            <img src="y.png" id="yes-btn" alt="예">
            <div id="layer-ui" class="layer">
            </div>
        </div>

        <!-- 하단 컨트롤러 -->
        <div id="controls">
            <div class="control-group">
                <div id="btn-left" class="btn"><img src="l.png" alt="왼쪽"></div>
                <div id="btn-right" class="btn"><img src="r.png" alt="오른쪽"></div>
            </div>
            <div class="control-group">
                <div id="btn-jump" class="btn"><img src="j.png" alt="점프"></div>
                <div id="btn-action" class="btn"><img src="a.png" alt="상호작용"></div>
            </div>
        </div>

        <!-- 아트 창 -->
        <div id="art-window">
            <img src="name.png" id="art-name-overlay" alt="이름레이어">
            <img src="X.png" id="exit-btn" alt="닫기">
            <img src="eraser.png" id="btn-eraser" class="btn" alt="지우개">

            <div id="art-group-container" style="position: absolute; left: 50%; transform: translateX(-50%); width: 365px; height: 100%; top: 0; pointer-events: none;">
                <div id="canvas-left" class="canvas-container">
                    <canvas id="c1" width="200" height="300"></canvas>
                    <img src="ns.png" class="canvas-overlay" alt="오버레이">
                </div>
                <div id="canvas-right" class="canvas-container">
                    <canvas id="c2" width="160" height="60"></canvas>
                </div>

                <div id="art-ui">
                    <div style="display: flex; align-items: flex-end; gap: 10px;">
                        <div id="palette-controls">
                            <div id="btn-brush" class="btn"><img src="brush.png" alt="브러쉬"></div>
                            <div id="btn-bold" class="bold-dots">
                                <div class="dot" style="width: 14px; height: 14px; left: 10px; top: -5px;"></div>
                                <div class="dot" style="width: 18px; height: 18px; left: 25px; top: 10px;"></div>
                                <div class="dot" style="width: 22px; height: 22px; left: 10px; top: 30px;"></div>
                            </div>
                        </div>
                        <div id="color-palette">
                            <!-- 색상들이 JS에서 생성됨 -->
                        </div>
                    </div>
                </div>
            </div>

            <div id="confirm-exit">
                <img src="xw.png" id="exit-msg" alt="종료할까요?">
                <div class="exit-btns">
                    <img src="OK.png" id="ok-btn" alt="확인">
                    <img src="NO.png" id="no-btn" alt="취소">
                </div>
            </div>
        </div>

        <!-- 요리 게임 오버레이 -->
        <div id="cook-game-overlay" style="position: absolute; top:0; left:0; width:100%; height:100%; z-index: 2000; display:none; background:url('cookbg.png') center center / cover no-repeat; flex-direction:column; align-items:center; justify-content:center;">
            <div id="gauge-container" style="position:relative; width:300px; height:40px; background:#444; border:3px solid #fff; border-radius:20px; overflow:hidden;">
                <div style="position:absolute; left:0; width:25%; height:100%; background:#888;"></div>
                <div style="position:absolute; left:25%; width:15%; height:100%; background:#aaa;"></div>
                <div style="position:absolute; left:40%; width:20%; height:100%; background:#fff;"></div>
                <div style="position:absolute; left:60%; width:15%; height:100%; background:#aaa;"></div>
                <div style="position:absolute; left:75%; width:25%; height:100%; background:#888;"></div>
                <div id="gauge-bar" style="position:absolute; left:0; width:8px; height:100%; background:red; box-shadow: 0 0 5px #000;"></div>
            </div>
            <!-- Round-specific Cook Image -->
            <div id="cook-round-img-container" style="margin-top: 20px; display: flex; align-items: center; justify-content: center;">
                <img id="cook-round-img" src="" style="display: none;">
            </div>
            <!-- Temporary A Button for Mobile Cooking -->
            <div id="cook-mobile-a-btn" style="display:none; margin-top:30px; cursor:pointer; -webkit-tap-highlight-color: transparent;">
                <img src="a2.png" alt="A button">
            </div>
            <div id="cook-result-display" style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); z-index:2100; pointer-events:none; display:none;">
                <img id="cook-result-img-node" src="" style="display:none;">
            </div>
            <div id="cook-rank-display" style="display:none; position:relative; width:340px; height:240px; background:url('js.png') center center / contain no-repeat; margin-top: -50px;">
                <!-- Individual Round Scores: shifted right by 17px, R1 down 10px, R3 up 5px -->
                <img id="score-r1" src="" style="position:absolute; left:82px; top:55px; width:25px;">
                <img id="score-r2" src="" style="position:absolute; left:82px; top:110px; width:25px;">
                <img id="score-r3" src="" style="position:absolute; left:82px; top:170px; width:25px;">

                <!-- Rank stamp: shifted left 3px from 51px -> 54px -->
                <img id="rank-img" src="" alt="Rank" style="position:absolute; top:60px; right:54px;">

                <!-- Control Buttons -->
                <div style="position:absolute; bottom:25px; right:15px; display:flex; gap:10px;">
                    <img id="re-btn" src="re.png" alt="Retry" style="cursor:pointer; display:none;">
                    <img id="go-btn" src="go.png" alt="Go" style="cursor:pointer; display:none;">
                </div>
            </div>
        </div>

        <!-- 요리 드로잉 창 -->
        <div id="cook-drawing-window" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index: 2500; display:none; background:url('cbg.png') center center / cover no-repeat;">
            <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); display:flex; flex-direction:column; align-items:center;">
                <div id="canvas3-container" style="width:150px; height:150px; border-radius:50%; border:none; overflow:hidden; background:white; cursor:crosshair;">
                    <canvas id="c3" width="150" height="150" style="width:100%; height:100%;"></canvas>
                </div>
            </div>

            <!-- 요리 드로잉 UI -->
            <div id="cook-ui" style="position:absolute; bottom:170px; width:100%; display:flex; flex-direction:column; align-items:center; pointer-events: none;">
                <!-- Palette centered ABOVE buttons -->
                <div id="color-palette-cook" style="display:none; flex-wrap: wrap; justify-content: center; gap: 5px; padding: 10px; pointer-events: auto; width: 100%; max-width: 300px; margin-bottom: 10px;"></div>

                <div style="display:flex; gap:15px; align-items:flex-end; pointer-events: auto;">
                    <div id="btn-brush-cook" class="btn"><img src="brush.png" alt="브러쉬"></div>
                    <div id="btn-bold-cook" class="bold-dots">
                        <div class="dot cook-dot" style="width: 14px; height: 14px; left: 10px; top: -5px;"></div>
                        <div class="dot cook-dot" style="width: 18px; height: 18px; left: 25px; top: 10px;"></div>
                        <div class="dot cook-dot" style="width: 22px; height: 22px; left: 10px; top: 30px;"></div>
                    </div>
                    <img src="eraser.png" id="btn-eraser-cook" class="btn" alt="지우개">
                </div>

                <!-- Reset Button: 50px below controls -->
                <div style="margin-top: 20px; pointer-events: auto;">
                    <img src="re.png" id="btn-reset-cook" class="btn" alt="초기화">
                </div>
            </div>

            <img src="X.png" id="cook-end-trigger" style="position:absolute; top:120px; right:20px; cursor:pointer;">

            <div id="confirm-exit-cook" style="position:absolute; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.6); z-index:3000;">
                <img src="xw.png" id="exit-msg-cook" alt="종료할까요?" style="margin-bottom: 20px;">
                <div class="exit-btns">
                    <img src="OK.png" id="ok-btn-cook" alt="확인">
                    <img src="NO.png" id="no-btn-cook" alt="취소">
                </div>
            </div>
        </div>

        <!-- 엔딩 화면 -->
        <div id="ending-screen">
            <div id="ending-content">
                <img src="ebg.png" id="ebg">
                <div id="result-canvases"></div>
            </div>
            <!-- Top Layer Full Screen Image - Centered on ending-screen -->
            <img src="ebg2.png" id="ebg2" style="position:absolute; top:50%; left:50%; width:auto; height:auto; max-width:100%; max-height:100%; transform:translate(-50%, -50%); z-index: 1000; pointer-events: none; object-fit: contain;">
            <img src="ck.png" id="save-btn" alt="이미지 저장">
            <div id="save-flash"></div>
            <img src="save.png" id="save-notice" alt="저장 완료">
        </div>
    </div>

    <script>
        // Asset Preloading
        const assetUrls = [
            'p.png', 'pr.png', 'pr2.png', 'prs.png', 'pl.png', 'pl2.png', 'pls.png', 'prj.png', 'plj.png',
            'start.png', 'bg.png', 'fbg.png', 'm2bg.png', 'star.png', 'w.png', 'w2.png', 'w3.png', 'w4.png',
            'y.png', 'a.png', 'a1.png', 'art.png', 'house.png', 'name.png', 'X.png', 'eraser.png',
            'brush.png', 'xw.png', 'OK.png', 'NO.png', 'ns.png', 'end.png', 'ebg.png',
            'cook.png', 'cook1.png', 'cook2.png', 'cook3.png', 'cookbg.png', 'nice.png', 'good.png', 'mi.png', 'sl.png', 'al.png', 'bl.png', 'cl.png', 're.png', 'door.png', 'w5.png', 'w6.png',
            'js.png', 'go.png', '1.png', '2.png', '3.png', '4.png', '5.png', '6.png', '7.png', '8.png', '9.png', 'a2.png', 'endg.png', 'cbg.png', 'ebg2.png', 'ck.png', 'save.png'
        ];
        const loadedAssets = {};
        let assetsToLoadCount = assetUrls.length;

        function preloadImages(callback) {
            assetUrls.forEach(url => {
                const img = new Image();
                img.onload = () => {
                    assetsToLoadCount--;
                    if (assetsToLoadCount === 0) callback();
                };
                img.onerror = () => {
                    assetsToLoadCount--;
                    console.error("Failed to load asset:", url);
                    if (assetsToLoadCount === 0) callback();
                };
                img.src = url;
                loadedAssets[url] = img;
            });
        }

        const player = document.getElementById('player');
        const screenWindow = document.getElementById('screen-window');
        const artItem = document.getElementById('art-item');
        const houseItem = document.getElementById('house');
        const cookItem = document.getElementById('cook-item');
        const doorItem = document.getElementById('door-item');

        let playerX = 50;
        let playerY = 0; // relative to bottom: 50px
        let playerVelX = 0;
        let playerVelY = 0;
        let isGrounded = true;
        let canMove = false;
        let facingRight = true;
        let isMoving = false;
        let walkFrame = 1;
        let walkTimeAccumulator = 0;
        const walkFrameDuration = 18; // roughly 0.3s at 60fps (60 * 0.3 = 18)

        let speechActive = false;
        let speechStep = 0;
        let isFading = false;
        const speechImages = ['w.png', 'w2.png', 'w3.png', 'w4.png', 'w5.png', 'w6.png'];

        const gravity = 0.5;
        const jumpPower = 9.6;
        const moveSpeed = 2.5;

        const keys = {};

        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'KeyZ') handleAction();
        });
        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // Touch controls
        function setupButton(id, code) {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                keys[code] = true;
            });
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                keys[code] = false;
            });
            btn.addEventListener('mousedown', (e) => {
                keys[code] = true;
            });
            btn.addEventListener('mouseup', (e) => {
                keys[code] = false;
            });
        }

        setupButton('btn-left', 'ArrowLeft');
        setupButton('btn-right', 'ArrowRight');
        setupButton('btn-jump', 'ControlLeft');

        const actionBtn = document.getElementById('btn-action');
        actionBtn.addEventListener('click', (e) => {
            e.preventDefault();
            handleAction();
        });
        actionBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleAction();
        }, { passive: false });

        // Fullscreen logic - Auto fullscreen on first interaction
        function goFullscreen() {
            const el = document.documentElement;
            const request = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;

            if (request && !document.fullscreenElement && !document.webkitFullscreenElement) {
                request.call(el).catch(err => {
                    console.log("Fullscreen request failed", err);
                });
            }

            // Mobile orientation lock
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('portrait').catch(() => {});
            }

            document.removeEventListener('click', goFullscreen);
            document.removeEventListener('touchstart', goFullscreen);
        }
        document.addEventListener('click', goFullscreen);
        document.addEventListener('touchstart', goFullscreen, { passive: false });
        document.getElementById('speech-bubble-container').addEventListener('click', advanceSpeech);
        document.getElementById('yes-btn').addEventListener('click', () => {
             // Handled in advanceSpeech
        });

        // Start sequence: Click or touch to start
        const startOverlay = document.getElementById('start-overlay');
        function handleStart(e) {
            if (e) e.preventDefault();

            // Fix: Trigger fullscreen on actual user interaction
            goFullscreen();

            startOverlay.style.opacity = '0';
            startOverlay.removeEventListener('click', handleStart);
            startOverlay.removeEventListener('touchstart', handleStart);
            setTimeout(() => {
                startOverlay.style.display = 'none';
                startOpening();
            }, 2000);
        }

        // Only bind start listener after preloading
        preloadImages(() => {
            startOverlay.addEventListener('click', handleStart);
            startOverlay.addEventListener('touchstart', handleStart, { passive: false });
            startOverlay.style.cursor = 'pointer';
        });

        function startOpening() {
            const star = document.getElementById('star');
            star.style.top = '50%';
            setTimeout(() => {
                speechActive = true;
                isFading = true;
                const container = document.getElementById('speech-bubble-container');
                const guideA = document.getElementById('guide-a');

                // Force initial state
                container.style.display = 'block';
                container.style.opacity = '0';
                guideA.style.display = 'block';

                // Allow browser to register display:block before starting transition
                requestAnimationFrame(() => {
                    container.style.opacity = '1';
                    setTimeout(() => {
                        isFading = false;
                    }, 500);
                });
            }, 1000);
        }

        function advanceSpeech() {
            if (!speechActive || isFading) return;

            // Handle last bubbles
            if (speechStep === 3) {
                finishOpening();
                return;
            }
            if (speechStep === 5) {
                finishFinalOpening();
                return;
            }

            isFading = true;
            const container = document.getElementById('speech-bubble-container');
            const guideA = document.getElementById('guide-a');
            container.style.opacity = '0';

            // Hide guide button from w2 onwards
            guideA.style.display = 'none';

            // Wait for fade out (0.5s)
            setTimeout(() => {
                speechStep++;
                const bubbleImg = document.getElementById('speech-bubble');

                const tempImg = new Image();
                tempImg.onload = () => {
                    bubbleImg.src = speechImages[speechStep];
                    container.style.opacity = '1';

                    // Wait for fade in (0.5s)
                    setTimeout(() => {
                        isFading = false;
                    }, 500);
                };
                tempImg.src = speechImages[speechStep];
            }, 500);
        }

        function finishOpening() {
            if (isFading) return;
            isFading = true; // Lock interactions during sequence

            const container = document.getElementById('speech-bubble-container');
            const yesBtn = document.getElementById('yes-btn');
            const star = document.getElementById('star');

            // Fade out w4
            container.style.opacity = '0';

            setTimeout(() => {
                container.style.display = 'none';

                // Position y.png above player
                const pH = player.clientHeight || 48;
                yesBtn.style.left = playerX + 'px';
                yesBtn.style.bottom = (50 + playerY + pH - 28) + 'px';
                yesBtn.style.transform = 'translateX(-50%)';

                // Show y.png with fade in
                yesBtn.style.display = 'block';
                void yesBtn.offsetWidth; // Trigger reflow
                yesBtn.style.opacity = '1';

                // Simultaneously fly star
                star.classList.add('star-jump-out');

                // Stay for 1.5 seconds to allow fade in
                setTimeout(() => {
                    // Hide y.png with fade out
                    yesBtn.style.opacity = '0';
                    setTimeout(() => {
                        yesBtn.style.display = 'none';
                        speechActive = false;
                        star.style.display = 'none';
                        star.classList.remove('star-jump-out');
                        canMove = true;
                        isFading = false;
                    }, 500);
                }, 1500);
            }, 500);
        }

        function finishFinalOpening() {
             const container = document.getElementById('speech-bubble-container');
             container.style.opacity = '0';
             setTimeout(() => {
                 container.style.display = 'none';
                 document.getElementById('ending-screen').style.display = 'flex';
             }, 500);
        }

        let lastTime = 0;
        function update(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const dt = Math.min((timestamp - lastTime) / (1000 / 60), 2.0);
            lastTime = timestamp;

            // Cooking Gauge Logic - Moved here to run even when canMove is false
            if (isCooking) {
                barPos += barDir * barSpeed * dt;
                if (barPos >= 292) { barPos = 292; barDir = -1; }
                if (barPos <= 0) { barPos = 0; barDir = 1; }
                document.getElementById('gauge-bar').style.left = barPos + 'px';
            }

            if (!canMove) {
                requestAnimationFrame(update);
                return;
            }

            let currentlyMoving = false;
            if (keys['ArrowRight']) {
                playerVelX = moveSpeed;
                facingRight = true;
                currentlyMoving = true;
            } else if (keys['ArrowLeft']) {
                playerVelX = -moveSpeed;
                facingRight = false;
                currentlyMoving = true;
            } else {
                playerVelX = 0;
            }

            // Handle transition from moving to stopped
            if (isMoving && !currentlyMoving) {
                isMoving = false;
                if (facingRight) {
                    player.src = 'prs.png';
                } else {
                    player.src = 'pls.png';
                }
            } else if (!isMoving && currentlyMoving) {
                isMoving = true;
                walkFrame = 1;
                walkTimeAccumulator = 0;
            }

            if ((keys['ControlLeft'] || keys['ControlRight']) && isGrounded) {
                playerVelY = jumpPower;
                isGrounded = false;
            }

            playerX += playerVelX * dt;
            playerY += playerVelY * dt;

            if (!isGrounded) {
                playerVelY -= gravity * dt;
            }

            // Screen bounds (player is 64px wide, centered)
            const halfW = 32;
            if (playerX < halfW) playerX = halfW;
            if (playerX > screenWindow.clientWidth - halfW) playerX = screenWindow.clientWidth - halfW;

            if (playerY <= 0) {
                playerY = 0;
                playerVelY = 0;
                isGrounded = true;
            }

            const maxPlayerY = screenWindow.clientHeight - 50 - player.clientHeight;
            if (playerY > maxPlayerY) {
                playerY = maxPlayerY;
                playerVelY = 0;
            }

            player.style.left = playerX + 'px';
            player.style.bottom = (50 + playerY) + 'px';

            // Animation Logic
            if (!isGrounded) {
                player.src = facingRight ? 'prj.png' : 'plj.png';
            } else if (isMoving) {
                walkTimeAccumulator += dt;
                if (walkTimeAccumulator >= walkFrameDuration) {
                    walkTimeAccumulator = 0;
                    walkFrame = walkFrame === 1 ? 2 : 1;
                }

                if (facingRight) {
                    player.src = walkFrame === 1 ? 'pr.png' : 'pr2.png';
                } else {
                    player.src = walkFrame === 1 ? 'pl.png' : 'pl2.png';
                }
            } else {
                // Not jumping, not moving
                if (!player.src.includes('prs.png') && !player.src.includes('pls.png')) {
                    player.src = 'p.png';
                }
            }

            requestAnimationFrame(update);
        }

        let isArtCaptured = false;
        let isCookCaptured = false;
        let lastCalculatedStatus = ''; // Added to track rank status
        let currentMap = 1;

        function handleAction() {
            if (isCooking) {
                stopCookBar();
                return;
            }
            if (!canMove) {
                if (speechActive) {
                    advanceSpeech();
                }
                return;
            }

            const pRect = player.getBoundingClientRect();

            if (currentMap === 1) {
                // Art item collision
                if (artItem.style.display !== 'none') {
                    const artRect = artItem.getBoundingClientRect();
                    if (isColliding(pRect, artRect) && !isArtCaptured) {
                        openArtWindow();
                        return;
                    }
                }
                // House collision
                const houseRect = houseItem.getBoundingClientRect();
                if (isColliding(pRect, houseRect) && isArtCaptured) {
                    transitionToMap2();
                    return;
                }
            } else if (currentMap === 2) {
                // Cook item collision
                if (cookItem.style.display !== 'none') {
                    const cookRect = cookItem.getBoundingClientRect();
                    if (isColliding(pRect, cookRect) && !isCookCaptured) {
                        startCookGame();
                        return;
                    }
                }
                // Door collision
                const doorRect = doorItem.getBoundingClientRect();
                if (isColliding(pRect, doorRect)) {
                    transitionToMap1();
                    return;
                }
            }
        }

        function isColliding(r1, r2) {
            return !(r1.right < r2.left || r1.left > r2.right || r1.bottom < r2.top || r1.top > r2.bottom);
        }

        function transitionToMap2() {
            currentMap = 2;
            document.getElementById('bg-img').src = 'm2bg.png';
            houseItem.style.display = 'none';
            cookItem.style.display = 'block';
            doorItem.style.display = 'block';
            playerX = 50; player.style.left = '50px';
        }

        function transitionToMap1() {
            currentMap = 1;
            document.getElementById('bg-img').src = 'bg.png';
            doorItem.style.display = 'none';
            cookItem.style.display = 'none';
            houseItem.style.display = 'block';

            // Set player position to house location (392 - 30 - halfWidth)
            playerX = 392 - 30 - (houseItem.naturalWidth / 2 || 32);

            if (isCookCaptured) {
                // Star return only if cooking game was successful
                const star = document.getElementById('star');
                star.style.display = 'block';
                star.style.top = '-100px';
                star.classList.remove('star-jump-out');
                setTimeout(() => {
                    star.style.top = '50%';
                    setTimeout(() => {
                        speechActive = true;
                        speechStep = 4; // w5
                        const container = document.getElementById('speech-bubble-container');
                        const bubbleImg = document.getElementById('speech-bubble');
                        bubbleImg.src = 'w5.png';
                        container.style.display = 'block';
                        container.style.opacity = '1';
                        canMove = false;
                    }, 1000);
                }, 100);
            } else {
                // No event if cooking was not completed
                canMove = true;
                const star = document.getElementById('star');
                star.style.display = 'none';
            }
        }

        // ART WINDOW
        function openArtWindow() {
            canMove = false;
            document.getElementById('art-window').style.display = 'block';
            initDrawing();
        }

        const c1 = document.getElementById('c1');
        const c2 = document.getElementById('c2');
        const ctx1 = c1.getContext('2d');
        const ctx2 = c2.getContext('2d');
        let currentBrushColor = '#262626';
        let isDrawing = false;
        let isEraser = false;
        let brushSizeStage = 0; // 0, 1, 2
        const brushSizes = [2, 5, 10];

        function initDrawing() {
            const dots = document.querySelectorAll('.dot:not(.cook-dot)');
            dots.forEach((dot, i) => {
                dot.style.backgroundColor = (i === brushSizeStage) ? '#7D7D7D' : '#FFFFFF';
            });

            const palette = document.getElementById('color-palette');
            if (palette.children.length === 0) {
                const colors = ['#262626', '#FFFBF0', '#FF2D30', '#FFE5D1', '#FFB44B', '#FFFF4B', '#DDFFA2', '#889751', '#399844', '#C6F0F9', '#3C50F1', '#D6BEFF', '#8B4FC5', '#FFCAF1', '#FF91D3', '#6D4130'];
                colors.forEach(color => {
                    const opt = document.createElement('div');
                    opt.className = 'color-opt';
                    opt.style.backgroundColor = color;
                    opt.onclick = () => {
                        currentBrushColor = color;
                        isEraser = false;
                        palette.style.display = 'none';
                    };
                    palette.appendChild(opt);
                });
            }
        }

        function setupCanvas(canvas, ctx, isCook = false) {

            function getPos(e) {
                const rect = canvas.getBoundingClientRect();

                // Calculate scale based on the game-container's current rendered size vs its base size (440x920)
                const container = document.getElementById('game-container');
                const containerRect = container.getBoundingClientRect();
                const scale = containerRect.height / 920;

                let cx, cy;
                if (e.touches && e.touches.length > 0) {
                    cx = e.touches[0].clientX;
                    cy = e.touches[0].clientY;
                } else if (e.changedTouches && e.changedTouches.length > 0) {
                    cx = e.changedTouches[0].clientX;
                    cy = e.changedTouches[0].clientY;
                } else {
                    cx = e.clientX;
                    cy = e.clientY;
                }

                // Adjust for viewport coordinates to local container coordinates, then divide by scale
                let x = (cx - rect.left) / scale;
                let y = (cy - rect.top) / scale;

                // Scale further if the canvas internal size differs from its CSS size
                x = x * (canvas.width / (rect.width / scale));
                y = y * (canvas.height / (rect.height / scale));

                return { x, y };
            }
            function start(e) {
                // Determine if we should start drawing based on window visibility
                const win = isCook ? 'cook-drawing-window' : 'art-window';
                if (document.getElementById(win).style.display !== 'block') return;

                isDrawing = true;
                const pos = getPos(e);
                ctx.beginPath();
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.moveTo(pos.x, pos.y);
                if (e.cancelable) e.preventDefault();
            }
            function move(e) {
                if (!isDrawing) return;
                const pos = getPos(e);

                if (isCook) {
                    if (isEraserCook) {
                        ctx.globalCompositeOperation = 'destination-out';
                    } else {
                        ctx.globalCompositeOperation = 'source-over';
                        ctx.strokeStyle = currentBrushColorCook;
                    }
                    const currentWidth = brushSizes[brushSizeStageCook];
                    ctx.lineWidth = isEraserCook ? currentWidth * 4 : currentWidth;
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.strokeStyle = isEraser ? '#FFFFFF' : currentBrushColor;
                    const currentWidth = brushSizes[brushSizeStage];
                    ctx.lineWidth = isEraser ? currentWidth * 4 : currentWidth;
                }

                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
                if (e.cancelable) e.preventDefault();
            }
            function end() { isDrawing = false; }
            canvas.addEventListener('mousedown', start);
            canvas.addEventListener('mousemove', move);
            window.addEventListener('mouseup', end);
            canvas.addEventListener('touchstart', start, { passive: false });
            canvas.addEventListener('touchmove', move, { passive: false });
            canvas.addEventListener('touchend', end);
        }

        document.getElementById('btn-brush').onclick = () => {
            const palette = document.getElementById('color-palette');
            const isClosing = palette.style.display === 'grid';
            palette.style.display = isClosing ? 'none' : 'grid';
            if (!isClosing) {
                Array.from(palette.children).forEach(opt => {
                    const rx = (Math.random() * 6 - 3).toFixed(1);
                    const ry = (Math.random() * 6 - 3).toFixed(1);
                    opt.style.transform = `translate(${rx}px, ${ry}px)`;
                });
            }
            isEraser = false;
        };
        document.getElementById('btn-eraser').onclick = () => { isEraser = true; document.getElementById('color-palette').style.display = 'none'; };
        document.getElementById('btn-bold').onclick = () => {
            brushSizeStage = (brushSizeStage + 1) % 3;
            const dots = document.querySelectorAll('.dot:not(.cook-dot)');
            dots.forEach((dot, i) => { dot.style.backgroundColor = (i === brushSizeStage) ? '#7D7D7D' : '#FFFFFF'; });
        };

        const exitBtn = document.getElementById('exit-btn');
        const confirmExit = document.getElementById('confirm-exit');
        const okBtn = document.getElementById('ok-btn');
        const noBtn = document.getElementById('no-btn');
        exitBtn.onclick = () => { confirmExit.style.display = 'flex'; };
        okBtn.onclick = () => { captureArtwork(); };
        noBtn.onclick = () => { confirmExit.style.display = 'none'; };

        const originalHandleAction = handleAction;
        handleAction = function() {
            if (document.getElementById('art-window').style.display === 'block') {
                if (confirmExit.style.display === 'flex') { captureArtwork(); }
                else { confirmExit.style.display = 'flex'; }
                return;
            }
            if (document.getElementById('cook-drawing-window').style.display === 'block') {
                 if (document.getElementById('confirm-exit-cook').style.display === 'flex') { captureCookwork(); }
                 else { document.getElementById('confirm-exit-cook').style.display = 'flex'; }
                 return;
            }
            originalHandleAction();
        };

        function captureArtwork() {
            const resultArea = document.getElementById('result-canvases');
            const cap1 = document.createElement('canvas');
            const cap2 = document.createElement('canvas');
            cap1.width = c1.width; cap1.height = c1.height;
            cap2.width = c2.width; cap2.height = c2.height;
            const ctxCap1 = cap1.getContext('2d');
            const ctxCap2 = cap2.getContext('2d');
            ctxCap1.drawImage(c1, 0, 0);
            const overlay = document.querySelector('.canvas-overlay');
            if (overlay && overlay.complete && overlay.naturalWidth !== 0) { ctxCap1.drawImage(overlay, 0, 0, cap1.width, cap1.height); }
            ctxCap2.drawImage(c2, 0, 0);

            cap1.className = 'captured-canvas';
            cap2.className = 'captured-canvas';

            // Layout: Canvas 1 on the right, shifted left 20px from 25px
            cap1.style.right = '30px';
            cap1.style.top = '10px';
            cap1.style.zIndex = '11';

            // Layout: Canvas 2 overlapping Canvas 1, shifted right 80px from 1px
            cap2.style.left = '81px';
            cap2.style.top = (10 + cap1.height - cap2.height + 20) + 'px';
            cap2.style.zIndex = '12';

            resultArea.appendChild(cap1);
            resultArea.appendChild(cap2);

            document.getElementById('art-window').style.display = 'none';
            confirmExit.style.display = 'none';
            artItem.style.display = 'none';
            isArtCaptured = true; canMove = true;
        }

        // COOKING GAME
        let isCooking = false;
        let cookRound = 0;
        let totalCookScore = 0;
        let roundScores = [];
        let barPos = 0;
        let barDir = 1;
        let barSpeed = 5;

        function startCookGame() {
            canMove = false;
            isCooking = true;
            cookRound = 0;
            totalCookScore = 0;
            roundScores = [];
            document.getElementById('cook-game-overlay').style.display = 'flex';
            document.getElementById('cook-rank-display').style.display = 'none';
            document.getElementById('re-btn').style.display = 'none';

            // Setup mobile A button
            const mobileABtn = document.getElementById('cook-mobile-a-btn');
            mobileABtn.style.display = 'block';
            if (!mobileABtn.dataset.listenerAdded) {
                const triggerStop = (e) => {
                    e.preventDefault();
                    if (isCooking) stopCookBar();
                };
                mobileABtn.addEventListener('touchstart', triggerStop, { passive: false });
                mobileABtn.addEventListener('mousedown', triggerStop);
                mobileABtn.dataset.listenerAdded = "true";
            }

            nextCookRound();
        }

        function nextCookRound() {
            cookRound++;
            barPos = 0;
            barDir = 1; // Always start in the same direction
            barSpeed = 5 + (cookRound * 4);
            document.getElementById('cook-result-img-node').style.display = 'none';

            // Show round image
            const roundImg = document.getElementById('cook-round-img');
            roundImg.src = `cook${cookRound}.png`;
            roundImg.style.display = 'block';

            document.getElementById('cook-mobile-a-btn').style.visibility = 'visible';
        }

        function stopCookBar() {
            const barMid = barPos + 4;
            const percent = (barMid / 300) * 100;
            let score = 0;
            let img = '';

            if (percent >= 40 && percent <= 60) { score = 3; img = 'nice.png'; }
            else if ((percent >= 25 && percent < 40) || (percent > 60 && percent <= 75)) { score = 2; img = 'good.png'; }
            else { score = 1; img = 'mi.png'; }

            totalCookScore += score;
            roundScores.push(score);

            const resDisplay = document.getElementById('cook-result-display');
            const resImg = document.getElementById('cook-result-img-node');
            resImg.src = img;
            resDisplay.style.display = 'flex';
            resImg.style.display = 'block';
            resImg.classList.remove('boing-effect');
            void resImg.offsetWidth; // Trigger reflow
            resImg.classList.add('boing-effect');

            document.getElementById('cook-mobile-a-btn').style.visibility = 'hidden';

            isCooking = false;
            setTimeout(() => {
                resDisplay.style.display = 'none';
                resImg.style.display = 'none';
                if (cookRound < 3) {
                    isCooking = true;
                    nextCookRound();
                } else {
                    showCookRank();
                }
            }, 1000);
        }

        function showCookRank() {
            document.getElementById('cook-mobile-a-btn').style.display = 'none';

            // Set individual round score images
            document.getElementById('score-r1').src = `${roundScores[0]}.png`;
            document.getElementById('score-r2').src = `${roundScores[1]}.png`;
            document.getElementById('score-r3').src = `${roundScores[2]}.png`;

            let rankImg = '';
            let status = 'RETRY'; // RETRY, GO, SL
            let colorCount = 0;

            if (totalCookScore >= 9) { rankImg = 'sl.png'; status = 'SL'; colorCount = 16; }
            else if (totalCookScore === 8) { rankImg = 'al.png'; status = 'GO'; colorCount = 10; }
            else if (totalCookScore >= 6) { rankImg = 'bl.png'; status = 'GO'; colorCount = 5; }
            else { rankImg = 'cl.png'; status = 'RETRY'; }

            lastCalculatedStatus = status; // Store status for drawing window

            const rankDisplay = document.getElementById('cook-rank-display');
            const rankImgNode = document.getElementById('rank-img');
            const reBtn = document.getElementById('re-btn');
            const goBtn = document.getElementById('go-btn');

            rankImgNode.src = rankImg;
            rankDisplay.style.display = 'block';

            if (status === 'SL') {
                // SL: Only show Go button
                reBtn.style.display = 'none';
                goBtn.style.display = 'block';
                goBtn.onclick = () => {
                    document.getElementById('cook-game-overlay').style.display = 'none';
                    openCookDrawing(colorCount);
                };
            } else if (status === 'GO') {
                reBtn.style.display = 'block';
                goBtn.style.display = 'block';
                reBtn.onclick = startCookGame;
                goBtn.onclick = () => {
                    document.getElementById('cook-game-overlay').style.display = 'none';
                    openCookDrawing(colorCount);
                };
            } else {
                // CL rank: only retry
                reBtn.style.display = 'block';
                goBtn.style.display = 'none';
                reBtn.onclick = startCookGame;
            }
        }

        // COOK DRAWING
        const c3 = document.getElementById('c3');
        const ctx3 = c3.getContext('2d');
        let currentBrushColorCook = '#262626';
        let isEraserCook = false;
        let brushSizeStageCook = 0;

        function openCookDrawing(count) {
            document.getElementById('cook-drawing-window').style.display = 'block';

            // Hide Reset button if SL rank
            const resetContainer = document.getElementById('btn-reset-cook').parentElement;
            resetContainer.style.display = (lastCalculatedStatus === 'SL') ? 'none' : 'block';

            ctx3.clearRect(0, 0, c3.width, c3.height); // Ensure transparent start
            const palette = document.getElementById('color-palette-cook');
            palette.innerHTML = '';
            const colors = ['#262626', '#FFFBF0', '#FF2D30', '#FFE5D1', '#FFB44B', '#FFFF4B', '#DDFFA2', '#889751', '#399844', '#C6F0F9', '#3C50F1', '#D6BEFF', '#8B4FC5', '#FFCAF1', '#FF91D3', '#6D4130'];
            colors.slice(0, count).forEach(color => {
                const opt = document.createElement('div');
                opt.className = 'color-opt';
                opt.style.backgroundColor = color;
                opt.onclick = () => {
                    currentBrushColorCook = color;
                    isEraserCook = false;
                    palette.style.display = 'none';
                };
                palette.appendChild(opt);
            });
        }

        document.getElementById('btn-brush-cook').onclick = () => {
            const pal = document.getElementById('color-palette-cook');
            const isClosing = pal.style.display === 'flex';
            pal.style.display = isClosing ? 'none' : 'flex';
            if (!isClosing) {
                Array.from(pal.children).forEach(opt => {
                    const rx = (Math.random() * 6 - 3).toFixed(1);
                    const ry = (Math.random() * 6 - 3).toFixed(1);
                    opt.style.transform = `translate(${rx}px, ${ry}px)`;
                });
            }
            isEraserCook = false;
        };
        document.getElementById('btn-eraser-cook').onclick = () => { isEraserCook = true; document.getElementById('color-palette-cook').style.display = 'none'; };
        document.getElementById('btn-bold-cook').onclick = () => {
            brushSizeStageCook = (brushSizeStageCook + 1) % 3;
            const dots = document.querySelectorAll('.cook-dot');
            dots.forEach((dot, i) => { dot.style.backgroundColor = (i === brushSizeStageCook) ? '#7D7D7D' : '#FFFFFF'; });
        };

        document.getElementById('btn-reset-cook').onclick = () => {
            document.getElementById('cook-drawing-window').style.display = 'none';
            startCookGame();
        };

        document.getElementById('cook-end-trigger').onclick = () => { document.getElementById('confirm-exit-cook').style.display = 'flex'; };
        document.getElementById('ok-btn-cook').onclick = captureCookwork;
        document.getElementById('no-btn-cook').onclick = () => { document.getElementById('confirm-exit-cook').style.display = 'none'; };

        function captureCookwork() {
            const resultArea = document.getElementById('result-canvases');
            const cap3Canvas = document.createElement('canvas');
            cap3Canvas.width = 60; cap3Canvas.height = 60;
            const ctxCap3 = cap3Canvas.getContext('2d');

            // Create circular clipping path
            ctxCap3.beginPath();
            ctxCap3.arc(30, 30, 30, 0, Math.PI * 2);
            ctxCap3.clip();

            // Draw from c3 onto 60x60 canvas
            ctxCap3.drawImage(c3, 0, 0, c3.width, c3.height, 0, 0, 60, 60);

            // Convert to IMG to ensure only Canvas 1 and 2 are drawn as canvases
            const cap3 = new Image();
            cap3.src = cap3Canvas.toDataURL('image/png');

            cap3.className = 'captured-canvas';
            cap3.style.position = 'absolute';
            cap3.style.background = 'transparent';
            cap3.style.border = 'none';
            // Target position: Shifted right another 15px from 127px
            cap3.style.left = '142px';
            cap3.style.top = '65px';
            cap3.style.zIndex = '20';
            cap3.style.borderRadius = '50%';

            // Add endg.png image: Shifted right another 15px from 32px
            const endgImg = new Image();
            endgImg.src = 'endg.png';
            endgImg.style.position = 'absolute';
            endgImg.style.left = '47px';
            endgImg.style.top = '35px';
            endgImg.style.width = 'auto';
            endgImg.style.height = 'auto';
            endgImg.style.zIndex = '15';
            resultArea.appendChild(endgImg);

            resultArea.appendChild(cap3);

            document.getElementById('cook-drawing-window').style.display = 'none';
            document.getElementById('confirm-exit-cook').style.display = 'none';
            isCookCaptured = true;
            canMove = true;
            cookItem.style.display = 'none';
        }

        setupCanvas(c1, ctx1);
        setupCanvas(c2, ctx2);
        setupCanvas(c3, ctx3, true);

        document.getElementById('save-btn').onclick = saveEndingImage;

        function saveEndingImage() {
            // Flash Effect
            const flash = document.getElementById('save-flash');
            const notice = document.getElementById('save-notice');

            flash.style.display = 'block';
            setTimeout(() => {
                flash.style.display = 'none';
                notice.style.display = 'block';
                setTimeout(() => { notice.style.display = 'none'; }, 1500);
            }, 100);

            const saveCanvas = document.createElement('canvas');
            saveCanvas.width = 400;
            saveCanvas.height = 500;
            const sctx = saveCanvas.getContext('2d');

            // Top-left of 400x500 area in 440x920 base coordinates is (20, 160)
            sctx.translate(-20, -160);

            const container = document.getElementById('game-container');
            const containerRect = container.getBoundingClientRect();
            const scale = containerRect.height / 920;

            function drawElement(el) {
                const rect = el.getBoundingClientRect();
                // Relative to container and rounded to integers for sharpness
                const x = Math.round((rect.left - containerRect.left) / scale);
                const y = Math.round((rect.top - containerRect.top) / scale);
                const w = Math.round(rect.width / scale);
                const h = Math.round(rect.height / scale);

                if (el.tagName === 'CANVAS') {
                    // Draw white background and 1px border for Artwork Canvases
                    sctx.fillStyle = 'white';
                    sctx.fillRect(x, y, w, h);
                    sctx.strokeStyle = 'black';
                    sctx.lineWidth = 1;
                    sctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
                    sctx.drawImage(el, x, y, w, h);
                } else if (el.tagName === 'IMG') {
                    if (el.complete && el.naturalWidth !== 0) {
                        sctx.drawImage(el, x, y, w, h);
                    }
                }
            }

            // 1. Background (ebg)
            const ebg = document.getElementById('ebg');
            drawElement(ebg);

            // 2. Result elements (Captured Artwork & Cooking) - Sort by z-index
            const resultArea = document.getElementById('result-canvases');
            const elements = Array.from(resultArea.children);
            elements.sort((a, b) => {
                const zA = parseInt(window.getComputedStyle(a).zIndex) || 0;
                const zB = parseInt(window.getComputedStyle(b).zIndex) || 0;
                return zA - zB;
            });
            elements.forEach(drawElement);

            // 3. Top Layer Overlay (ebg2)
            const ebg2 = document.getElementById('ebg2');
            drawElement(ebg2);

            // 4. Download
            const link = document.createElement('a');
            link.download = 'memory.png';
            link.href = saveCanvas.toDataURL('image/png');
            link.click();
        }

        requestAnimationFrame(update);
    </script>
</body>
</html>
